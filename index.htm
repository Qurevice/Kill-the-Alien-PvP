<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kill the Alien — PvP по сети</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { margin: 0; min-height: 100vh; background: #0a0f1a; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .game-wrapper { position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; background: #0b1219; cursor: crosshair; }
        .ui-panel { position: absolute; top: 16px; left: 16px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border-radius: 20px; padding: 8px 16px; color: #ffd966; font-weight: bold; z-index: 20; font-family: monospace; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
        .status { font-size: 14px; color: #aaffaa; }
        .reset-btn { position: absolute; bottom: 16px; right: 16px; background: #ff8844; border: none; font-size: 18px; font-weight: bold; padding: 8px 20px; border-radius: 40px; color: #1e1a2a; cursor: pointer; font-family: 'Segoe UI', 'Verdana', sans-serif; box-shadow: 0 4px 0 #aa5522; transition: 0.07s linear; z-index: 100; letter-spacing: 1px; }
        .reset-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #aa5522; }
        .start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(8px); flex-direction: column; gap: 20px; }
        .start-box { background: #1a1e2a; border-radius: 40px; padding: 30px 40px; text-align: center; border: 1px solid #ffd966; box-shadow: 0 0 30px rgba(0,0,0,0.5); min-width: 300px; }
        .start-box h2 { color: #ffd966; margin-top: 0; }
        .start-box input { background: #2a2e3a; border: 1px solid #ffd966; padding: 10px 15px; border-radius: 40px; color: white; font-family: monospace; font-size: 16px; width: 180px; text-align: center; margin: 10px 0; outline: none; }
        .start-box button { background: #ff8844; border: none; font-size: 18px; font-weight: bold; padding: 10px 20px; border-radius: 40px; margin: 8px; cursor: pointer; font-family: monospace; transition: 0.05s linear; }
        .start-box button:active { transform: scale(0.96); }
        .peer-id { background: #2a2e3a; padding: 12px; border-radius: 20px; font-size: 18px; font-weight: bold; word-break: break-all; color: #aaffaa; margin: 15px 0; display: none; text-align: center; }
        .copy-btn { background: #ffaa44; border: none; padding: 6px 15px; border-radius: 30px; margin-left: 12px; cursor: pointer; font-size: 14px; font-weight: bold; font-family: monospace; }
        .copy-btn:active { transform: scale(0.95); }
        .message { color: #ffaa88; margin-top: 12px; font-size: 14px; }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="ui-panel">
        <div>⚔️ PVP DUEL ⚔️</div>
        <div id="connectionStatus" class="status">Не подключено</div>
    </div>
    <button id="resetBtn" class="reset-btn">ИГРАТЬ СНОВА</button>

    <div id="startScreen" class="start-screen">
        <div class="start-box">
            <h2>👽 KILL THE ALIEN 👾</h2>
            <button id="createGameBtn">✨ СОЗДАТЬ ИГРУ</button>
            <div id="myPeerIdDisplay" class="peer-id"></div>
            <div>
                <input type="text" id="peerIdInput" placeholder="Введите ID соперника">
                <button id="connectBtn">🔌 ПОДКЛЮЧИТЬСЯ</button>
            </div>
            <div id="connMessage" class="message"></div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- Элементы ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const resetBtn = document.getElementById('resetBtn');
        const startScreen = document.getElementById('startScreen');
        const createBtn = document.getElementById('createGameBtn');
        const connectBtn = document.getElementById('connectBtn');
        const peerIdInput = document.getElementById('peerIdInput');
        const myPeerIdDisplay = document.getElementById('myPeerIdDisplay');
        const connMessageSpan = document.getElementById('connMessage');
        const connectionStatusSpan = document.getElementById('connectionStatus');

        // ---------- P2P ----------
        let peer = null;
        let currentConn = null;
        let myPeerId = null;
        let gameStarted = false;
        let isHost = false;
        let opponentPeerId = null;
        
        // ---------- Игровые состояния ----------
        let canvasWidth, canvasHeight;
        let player = { x: 0, y: 0, radius: 0, colorHue: 120, spinAngle: 0 };
        let opponent = { x: 0, y: 0, radius: 0, colorHue: 0, spinAngle: 0 };
        let shells = [];
        let particles = [];
        let comets = [];
        let stars = [];
        let gameActive = true;
        let winner = null;
        let gameOverDelay = false;
        
        let SHELL_RADIUS = 6;
        let SHELL_SPEED = 7.5;
        let PLAYER_RADIUS = 20;
        let ENEMY_RADIUS = 20;
        let STAR_SPEED = 0.6;
        let COMET_SPAWN_DELAY = 150;
        let cometSpawnTimer = 30;
        
        let shakeIntensity = 0, shakeDuration = 0;
        let playerFlash = 0, opponentFlash = 0;
        
        // ---------- Вспомогательные функции ----------
        function addShake(intensity, duration) {
            if (intensity > shakeIntensity) shakeIntensity = intensity;
            if (duration > shakeDuration) shakeDuration = duration;
        }
        function applyShake() {
            if (shakeDuration > 0 && shakeIntensity > 0.1) {
                const ox = (Math.random() - 0.5) * shakeIntensity * 2;
                const oy = (Math.random() - 0.5) * shakeIntensity * 2;
                ctx.translate(ox, oy);
                shakeIntensity *= 0.92;
                shakeDuration--;
            } else {
                shakeIntensity = 0;
                shakeDuration = 0;
            }
        }
        
        function createExplosion(x, y, isPlayer = false) {
            const cnt = 12 + Math.floor(Math.random() * 10);
            for (let i = 0; i < cnt; i++) {
                const a = Math.random() * Math.PI * 2;
                const sp = 2 + Math.random() * 5;
                particles.push({
                    x, y,
                    vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                    life: 20 + Math.random() * 20,
                    size: 2 + Math.random() * 4,
                    color: `hsl(${isPlayer ? 30 : 20 + Math.random() * 40}, 80%, 60%)`
                });
            }
            addShake(8, 12);
        }
        
        function recalcDimensions() {
            canvasWidth = canvas.width;
            canvasHeight = canvas.height;
            PLAYER_RADIUS = Math.min(canvasWidth, canvasHeight) * 0.045;
            ENEMY_RADIUS = PLAYER_RADIUS;
            SHELL_RADIUS = PLAYER_RADIUS * 0.28;
            SHELL_SPEED = Math.min(canvasWidth, canvasHeight) * 0.012;
            player.radius = PLAYER_RADIUS;
            opponent.radius = ENEMY_RADIUS;
            player.x = canvasWidth / 2;
            player.y = canvasHeight * 0.8;
            opponent.x = canvasWidth / 2;
            opponent.y = canvasHeight * 0.2;
            clampPlayerPosition();
            clampOpponentPosition();
        }
        
        function clampPlayerPosition() {
            const margin = PLAYER_RADIUS + 5;
            const minY = canvasHeight / 2 + 20;
            const maxY = canvasHeight - margin;
            const minX = margin;
            const maxX = canvasWidth - margin;
            player.x = Math.min(maxX, Math.max(minX, player.x));
            player.y = Math.min(maxY, Math.max(minY, player.y));
        }
        
        function clampOpponentPosition() {
            const margin = ENEMY_RADIUS + 5;
            opponent.x = Math.min(canvasWidth - margin, Math.max(margin, opponent.x));
            opponent.y = Math.min(canvasHeight / 2 - 20, Math.max(margin, opponent.y));
        }
        
        // ---------- Сетевые сообщения ----------
        function sendPosition() {
            if (currentConn && currentConn.open && gameStarted && gameActive) {
                currentConn.send({ type: 'pos', x: player.x, y: player.y });
            }
        }
        
        function sendFire(angle) {
            if (currentConn && currentConn.open && gameStarted && gameActive) {
                currentConn.send({ type: 'fire', angle: angle, fromX: player.x, fromY: player.y });
            }
        }
        
        function sendHit() {
            if (currentConn && currentConn.open && gameStarted && gameActive) {
                currentConn.send({ type: 'hit' });
            }
        }
        
        function sendReset() {
            if (currentConn && currentConn.open) {
                currentConn.send({ type: 'reset' });
            }
        }
        
        function fireAt(angle, fromX, fromY, isRemote = false) {
            const vx = Math.cos(angle) * SHELL_SPEED;
            const vy = Math.sin(angle) * SHELL_SPEED;
            shells.push({
                x: fromX, y: fromY, vx, vy,
                radius: SHELL_RADIUS,
                isRemote: isRemote,
                life: 300
            });
            if (!isRemote) playerFlash = 5;
            else opponentFlash = 5;
        }
        
        function checkCollisions() {
            if (!gameActive) return;
            for (let i = 0; i < shells.length; i++) {
                const s = shells[i];
                if (s.isRemote) {
                    const dx = s.x - player.x;
                    const dy = s.y - player.y;
                    if (Math.hypot(dx, dy) < player.radius + s.radius) {
                        gameActive = false;
                        winner = 'opponent';
                        createExplosion(player.x, player.y, true);
                        sendHit();
                        connectionStatusSpan.innerText = 'ПОРАЖЕНИЕ!';
                        showGameResult('ПОРАЖЕНИЕ! Соперник победил');
                        shells = [];
                        return;
                    }
                }
                s.x += s.vx;
                s.y += s.vy;
                if (s.x + s.radius < 0 || s.x - s.radius > canvasWidth || s.y + s.radius < 0 || s.y - s.radius > canvasHeight) {
                    shells.splice(i,1);
                    i--;
                }
            }
        }
        
        function showGameResult(msg) {
            if (gameOverDelay) return;
            gameOverDelay = true;
            const overlay = document.createElement('div');
            overlay.style.position = 'absolute';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.background = 'rgba(0,0,0,0.85)';
            overlay.style.display = 'flex';
            overlay.style.justifyContent = 'center';
            overlay.style.alignItems = 'center';
            overlay.style.zIndex = '150';
            overlay.style.fontFamily = 'monospace';
            overlay.style.fontSize = '36px';
            overlay.style.color = '#ffd966';
            overlay.style.flexDirection = 'column';
            overlay.style.gap = '20px';
            overlay.innerHTML = `<div>${msg}</div><button id="rematchBtn" style="padding:12px 24px;font-size:20px;background:#ff8844;border:none;border-radius:40px;cursor:pointer;">🔁 Играть снова</button>`;
            document.body.appendChild(overlay);
            document.getElementById('rematchBtn').onclick = () => {
                overlay.remove();
                resetGameLocal();
                sendReset();
            };
        }
        
        function resetGameLocal() {
            gameActive = true;
            winner = null;
            gameOverDelay = false;
            shells = [];
            particles = [];
            comets = [];
            player.x = canvasWidth / 2;
            player.y = canvasHeight * 0.8;
            opponent.x = canvasWidth / 2;
            opponent.y = canvasHeight * 0.2;
            clampPlayerPosition();
            clampOpponentPosition();
            playerFlash = 0;
            opponentFlash = 0;
            connectionStatusSpan.innerText = gameActive ? 'В БОЮ' : 'Ожидание';
            if (currentConn && currentConn.open) sendPosition();
        }
        
        // ---------- Графика ----------
        function generateStars() {
            stars = [];
            for (let i = 0; i < 300; i++) {
                stars.push({
                    x: Math.random() * canvasWidth,
                    y: Math.random() * canvasHeight,
                    radius: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.7 + 0.3
                });
            }
        }
        
        function updateStars() {
            for (let s of stars) {
                s.y += STAR_SPEED;
                if (s.y > canvasHeight) {
                    s.y = 0;
                    s.x = Math.random() * canvasWidth;
                }
            }
        }
        
        function spawnComet() {
            const side = Math.floor(Math.random() * 4);
            let x, y, vx, vy;
            let sp = 2 + Math.random() * 2.5;
            const scale = Math.min(canvasWidth, canvasHeight) * 0.004;
            sp *= scale;
            if (side === 0) { x = -20; y = Math.random() * canvasHeight; vx = sp; vy = (Math.random() - 0.5) * 1.2; }
            else if (side === 1) { x = canvasWidth + 20; y = Math.random() * canvasHeight; vx = -sp; vy = (Math.random() - 0.5) * 1.2; }
            else if (side === 2) { x = Math.random() * canvasWidth; y = -20; vx = (Math.random() - 0.5) * 1.2; vy = sp; }
            else { x = Math.random() * canvasWidth; y = canvasHeight + 20; vx = (Math.random() - 0.5) * 1.2; vy = -sp; }
            comets.push({ x, y, vx, vy, trail: [], size: 2.5 * scale, glow: "#ffe0a0" });
        }
        
        function updateComets() {
            if (cometSpawnTimer <= 0) {
                spawnComet();
                cometSpawnTimer = COMET_SPAWN_DELAY + Math.random() * 100;
            } else cometSpawnTimer--;
            for (let i = 0; i < comets.length; i++) {
                const c = comets[i];
                c.trail.unshift({ x: c.x, y: c.y });
                if (c.trail.length > 6) c.trail.pop();
                c.x += c.vx;
                c.y += c.vy;
                if (c.x < -200 || c.x > canvasWidth + 200 || c.y < -200 || c.y > canvasHeight + 200) {
                    comets.splice(i,1);
                    i--;
                }
            }
        }
        
        function drawStars() {
            for (let s of stars) {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,240,200,${s.alpha})`;
                ctx.fill();
            }
        }
        
        function drawComets() {
            for (let c of comets) {
                for (let j = 0; j < c.trail.length; j++) {
                    const t = c.trail[j];
                    const alpha = 0.6 * (1 - j / c.trail.length);
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, c.size * 0.5, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,200,100,${alpha})`;
                    ctx.fill();
                }
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.size, 0, Math.PI*2);
                ctx.fillStyle = c.glow;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.size * 0.4, 0, Math.PI*2);
                ctx.fillStyle = "#ffffff";
                ctx.fill();
            }
        }
        
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvasHeight);
            grad.addColorStop(0, "#0a1018");
            grad.addColorStop(1, "#03060c");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            drawStars();
            drawComets();
        }
        
        function drawUFO(x, y, radius, hue, flash = 0, isOwn = true) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(performance.now() * 0.004 * (isOwn ? 1 : -1));
            const glow = `hsl(${hue}, 80%, 65%)`;
            ctx.shadowBlur = 8;
            ctx.shadowColor = glow;
            const grad = ctx.createRadialGradient(-4, -4, radius * 0.2, 0, 0, radius);
            grad.addColorStop(0, `hsl(${hue}, 85%, 70%)`);
            grad.addColorStop(1, `hsl(${hue}, 75%, 40%)`);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, radius - 4, 0, Math.PI*2);
            ctx.fillStyle = `hsl(${hue}, 80%, 55%)`;
            ctx.fill();
            const cockpit = radius * 0.45;
            ctx.beginPath();
            ctx.arc(0, 0, cockpit, 0, Math.PI*2);
            ctx.fillStyle = "#7ec8e3";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, cockpit - 2, 0, Math.PI*2);
            ctx.fillStyle = "#9bdaf5";
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(-cockpit*0.3, -cockpit*0.3, cockpit*0.3, cockpit*0.2, 0, 0, Math.PI*2);
            ctx.fillStyle = "#ffffffcc";
            ctx.fill();
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const lx = Math.cos(angle) * (radius - 2);
                const ly = Math.sin(angle) * (radius - 2);
                ctx.beginPath();
                ctx.arc(lx, ly, 2, 0, Math.PI*2);
                ctx.fillStyle = `hsl(${hue}, 90%, 75%)`;
                ctx.fill();
            }
            if (flash > 0) {
                ctx.beginPath();
                ctx.arc(0, 0, radius + 8, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 100, 100, ${flash / 8})`;
                ctx.fill();
            }
            ctx.restore();
        }
        
        function drawShells() {
            for (let s of shells) {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
                ctx.fillStyle = s.isRemote ? "#ff6666" : "#88ff44";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius-2, 0, Math.PI*2);
                ctx.fillStyle = s.isRemote ? "#ffaaaa" : "#aaff88";
                ctx.fill();
            }
        }
        
        function drawParticles() {
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
            }
            particles = particles.filter(p => p.life > 0);
        }
        
        function drawUI() {
            ctx.font = "bold 20px 'Courier New'";
            ctx.fillStyle = "#ffd966";
            ctx.shadowBlur = 0;
            ctx.fillText(`❤️ ${gameActive ? 'Бой' : (winner === 'player' ? 'ПОБЕДА!' : 'ПОРАЖЕНИЕ')}`, 20, 50);
            ctx.beginPath();
            ctx.strokeStyle = "#ffaa55";
            ctx.lineWidth = 3;
            ctx.setLineDash([10, 15]);
            ctx.moveTo(0, canvasHeight/2);
            ctx.lineTo(canvasWidth, canvasHeight/2);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        // ---------- Сеть ----------
        function setupDataConnection(conn) {
            currentConn = conn;
            conn.on('open', () => {
                connectionStatusSpan.innerText = gameStarted ? 'В БОЮ' : 'Подключено';
                if (gameStarted === false) {
                    gameStarted = true;
                    resetGameLocal();
                } else {
                    sendPosition();
                }
                startScreen.style.display = 'none';
            });
            conn.on('data', (data) => {
                if (!gameStarted) return;
                if (data.type === 'pos') {
                    opponent.x = data.x;
                    opponent.y = data.y;
                    clampOpponentPosition();
                } else if (data.type === 'fire') {
                    fireAt(data.angle, data.fromX, data.fromY, true);
                } else if (data.type === 'hit') {
                    if (gameActive) {
                        gameActive = false;
                        winner = 'opponent';
                        createExplosion(player.x, player.y, true);
                        connectionStatusSpan.innerText = 'ПОРАЖЕНИЕ!';
                        showGameResult('ПОРАЖЕНИЕ! Соперник победил');
                    }
                } else if (data.type === 'reset') {
                    resetGameLocal();
                }
            });
            conn.on('close', () => {
                connectionStatusSpan.innerText = 'Соединение потеряно';
                gameStarted = false;
                gameActive = false;
                if (!gameOverDelay) showGameResult('Соединение разорвано');
            });
            conn.on('error', (err) => {
                console.error(err);
                connectionStatusSpan.innerText = 'Ошибка связи';
            });
        }
        
        function createGame() {
            peer = new Peer();
            peer.on('open', (id) => {
                myPeerId = id;
                myPeerIdDisplay.innerHTML = `🎮 Ваш ID: <strong style="font-size:22px;">${id}</strong> 
                    <button class="copy-btn" id="copyIdBtn">📋 Копировать</button>`;
                myPeerIdDisplay.style.display = 'block';
                document.getElementById('copyIdBtn').onclick = () => {
                    navigator.clipboard.writeText(id);
                    connMessageSpan.innerText = '✅ ID скопирован! Отправьте его другу.';
                    setTimeout(() => { if (connMessageSpan.innerText === '✅ ID скопирован! Отправьте его другу.') connMessageSpan.innerText = ''; }, 2000);
                };
                isHost = true;
                connMessageSpan.innerText = 'Ожидание подключения...';
                peer.on('connection', (conn) => {
                    connMessageSpan.innerText = 'Противник подключился!';
                    setupDataConnection(conn);
                    gameStarted = true;
                    resetGameLocal();
                });
            });
            peer.on('error', (err) => {
                connMessageSpan.innerText = 'Ошибка: ' + err.type;
                console.error(err);
            });
        }
        
        function joinGame(peerId) {
            if (!peer) {
                peer = new Peer();
                peer.on('open', () => {
                    const conn = peer.connect(peerId);
                    setupDataConnection(conn);
                    gameStarted = true;
                    resetGameLocal();
                });
                peer.on('error', (err) => {
                    connMessageSpan.innerText = 'Ошибка: ' + err.type;
                });
            } else {
                const conn = peer.connect(peerId);
                setupDataConnection(conn);
                gameStarted = true;
                resetGameLocal();
            }
            startScreen.style.display = 'none';
        }
        
        // ---------- Управление ----------
        function handleMove(e) {
            if (!gameStarted || !gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvasWidth / rect.width;
            const scaleY = canvasHeight / rect.height;
            let mx, my;
            if (e.touches) {
                mx = (e.touches[0].clientX - rect.left) * scaleX;
                my = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                mx = (e.clientX - rect.left) * scaleX;
                my = (e.clientY - rect.top) * scaleY;
            }
            if (my > canvasHeight / 2) {
                player.x = Math.min(canvasWidth - PLAYER_RADIUS - 5, Math.max(PLAYER_RADIUS + 5, mx));
                player.y = Math.min(canvasHeight - PLAYER_RADIUS - 5, Math.max(canvasHeight/2 + 20, my));
                sendPosition();
            }
        }
        
        function handleFire(e) {
            if (!gameStarted || !gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvasWidth / rect.width;
            const scaleY = canvasHeight / rect.height;
            let cx, cy;
            if (e.touches) {
                cx = (e.touches[0].clientX - rect.left) * scaleX;
                cy = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                cx = (e.clientX - rect.left) * scaleX;
                cy = (e.clientY - rect.top) * scaleY;
            }
            if (cy < canvasHeight / 2) {
                const dx = cx - player.x;
                const dy = cy - player.y;
                const angle = Math.atan2(dy, dx);
                fireAt(angle, player.x, player.y, false);
                sendFire(angle);
            }
        }
        
        // ---------- Цикл ----------
        function updateEffects() {
            if (playerFlash > 0) playerFlash--;
            if (opponentFlash > 0) opponentFlash--;
            updateStars();
            updateComets();
            if (gameActive) checkCollisions();
        }
        
        function draw() {
            ctx.save();
            applyShake();
            drawBackground();
            drawUFO(opponent.x, opponent.y, opponent.radius, opponent.colorHue, opponentFlash, false);
            drawUFO(player.x, player.y, player.radius, player.colorHue, playerFlash, true);
            drawShells();
            drawParticles();
            drawUI();
            ctx.restore();
        }
        
        function animate() {
            updateEffects();
            draw();
            requestAnimationFrame(animate);
        }
        
        // ---------- Инициализация ----------
        function resizeCanvasAndReset() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            recalcDimensions();
            generateStars();
            if (gameStarted) resetGameLocal();
        }
        
        window.addEventListener('resize', () => resizeCanvasAndReset());
        resetBtn.addEventListener('click', () => {
            if (gameStarted && currentConn && currentConn.open) {
                resetGameLocal();
                sendReset();
            } else if (gameStarted) resetGameLocal();
        });
        createBtn.addEventListener('click', createGame);
        connectBtn.addEventListener('click', () => {
            const pid = peerIdInput.value.trim();
            if (pid) joinGame(pid);
            else connMessageSpan.innerText = 'Введите ID';
        });
        
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('touchmove', handleMove);
        canvas.addEventListener('mousedown', handleFire);
        canvas.addEventListener('touchstart', handleFire);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        resizeCanvasAndReset();
        generateStars();
        animate();
    })();
</script>
</body>
</html>
