<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kill the Alien — PvP (упрощённая, рабочая)</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { margin: 0; min-height: 100vh; background: #0a0f1a; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .game-wrapper { position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; background: #0b1219; cursor: crosshair; }
        .ui-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 20px; color: #ffd966; font-family: monospace; font-weight: bold; z-index: 20; }
        .reset-btn { position: absolute; bottom: 16px; right: 16px; background: #ff8844; border: none; padding: 6px 15px; border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 100; }
        .start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(8px); flex-direction: column; }
        .start-box { background: #1a1e2a; border-radius: 30px; padding: 25px; text-align: center; border: 1px solid #ffd966; max-width: 90%; }
        .start-box button, .start-box input { margin: 8px; padding: 8px 15px; border-radius: 30px; border: none; font-size: 16px; }
        .start-box input { background: #2a2e3a; color: white; text-align: center; }
        .start-box button { background: #ff8844; font-weight: bold; cursor: pointer; }
        .peer-id { background: #2a2e3a; padding: 10px; border-radius: 20px; color: #aaffaa; word-break: break-all; margin: 15px 0; display: none; }
        .message { color: #ffaa88; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="ui-panel" id="statusMsg">⚡ Не подключено</div>
    <button id="resetBtn" class="reset-btn">РЕСТАРТ</button>

    <div id="startScreen" class="start-screen">
        <div class="start-box">
            <h2>👽 KILL THE ALIEN 👾</h2>
            <button id="createBtn">✨ СОЗДАТЬ ИГРУ</button>
            <div id="myIdBox" class="peer-id"></div>
            <div>
                <input id="peerInput" placeholder="ID соперника">
                <button id="joinBtn">🔌 ПОДКЛЮЧИТЬСЯ</button>
            </div>
            <div id="infoMsg" class="message"></div>
        </div>
    </div>
</div>

<script>
    (function(){
        // --- Элементы ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusSpan = document.getElementById('statusMsg');
        const resetBtn = document.getElementById('resetBtn');
        const startScreenDiv = document.getElementById('startScreen');
        const createBtn = document.getElementById('createBtn');
        const joinBtn = document.getElementById('joinBtn');
        const peerInput = document.getElementById('peerInput');
        const myIdBox = document.getElementById('myIdBox');
        const infoMsg = document.getElementById('infoMsg');

        // --- Параметры игры ---
        let cw, ch;
        let player = { x: 0, y: 0, r: 20 };
        let opponent = { x: 0, y: 0, r: 20 };
        let bullets = [];      // снаряды
        let gameActive = true; // идёт ли бой
        let winner = null;     // 'me' или 'enemy'
        let gameOverTimer = null;

        // Настройки
        let bulletSpeed = 8;
        let bulletRadius = 6;

        // --- Сеть ---
        let peer = null;
        let conn = null;
        let myId = null;
        let gameStarted = false;   // когда соединение установлено и можно играть

        // --- Вспомогательные функции ---
        function resizeAndReset() {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
            let size = Math.min(cw, ch) * 0.045;
            player.r = size;
            opponent.r = size;
            bulletSpeed = size * 0.25;
            bulletRadius = size * 0.3;
            // Начальные позиции
            player.x = cw/2;
            player.y = ch * 0.8;
            opponent.x = cw/2;
            opponent.y = ch * 0.2;
            clampPositions();
            if (gameStarted) {
                // очищаем пули и сбрасываем флаги при рестарте
                bullets = [];
                gameActive = true;
                winner = null;
                if (gameOverTimer) clearTimeout(gameOverTimer);
                statusSpan.innerText = "⚔️ В БОЮ";
            }
        }

        function clampPositions() {
            let margin = player.r + 5;
            // Игрок – нижняя половина
            player.x = Math.min(cw - margin, Math.max(margin, player.x));
            player.y = Math.min(ch - margin, Math.max(ch/2 + 20, player.y));
            // Противник – верхняя половина
            opponent.x = Math.min(cw - margin, Math.max(margin, opponent.x));
            opponent.y = Math.min(ch/2 - 20, Math.max(margin, opponent.y));
        }

        // --- Отрисовка (минималистичная, но понятная) ---
        function drawBackground() {
            ctx.fillStyle = "#0a1018";
            ctx.fillRect(0, 0, cw, ch);
            // простая линия разделения
            ctx.beginPath();
            ctx.moveTo(0, ch/2);
            ctx.lineTo(cw, ch/2);
            ctx.strokeStyle = "#ffaa55";
            ctx.lineWidth = 3;
            ctx.setLineDash([10, 10]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawUFO(x, y, r, hue, isOwn) {
            ctx.save();
            ctx.translate(x, y);
            ctx.shadowBlur = 6;
            ctx.shadowColor = `hsl(${hue}, 80%, 60%)`;
            let grad = ctx.createRadialGradient(-4, -4, r*0.2, 0, 0, r);
            grad.addColorStop(0, `hsl(${hue}, 85%, 70%)`);
            grad.addColorStop(1, `hsl(${hue}, 75%, 40%)`);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, r-4, 0, Math.PI*2);
            ctx.fillStyle = `hsl(${hue}, 80%, 55%)`;
            ctx.fill();
            // кабина
            ctx.beginPath();
            ctx.arc(0, 0, r*0.45, 0, Math.PI*2);
            ctx.fillStyle = "#7ec8e3";
            ctx.fill();
            ctx.restore();
        }

        function drawBullets() {
            for (let b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
                ctx.fillStyle = b.isEnemy ? "#ff6666" : "#88ff44";
                ctx.fill();
            }
        }

        function drawUI() {
            ctx.font = "bold 20px monospace";
            ctx.fillStyle = "#ffd966";
            ctx.shadowBlur = 0;
            let text = gameActive ? "БОЙ" : (winner === 'me' ? "ПОБЕДА!" : "ПОРАЖЕНИЕ");
            ctx.fillText(text, 15, 45);
        }

        // --- Логика игры ---
        function shoot(angle, fromX, fromY, isEnemy = false) {
            bullets.push({
                x: fromX, y: fromY,
                vx: Math.cos(angle) * bulletSpeed,
                vy: Math.sin(angle) * bulletSpeed,
                r: bulletRadius,
                isEnemy: isEnemy
            });
        }

        function updateBullets() {
            for (let i = 0; i < bullets.length; i++) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                if (b.x + b.r < 0 || b.x - b.r > cw || b.y + b.r < 0 || b.y - b.r > ch) {
                    bullets.splice(i,1);
                    i--;
                    continue;
                }
                if (!gameActive) continue;

                if (b.isEnemy) {
                    // вражеский снаряд → проверка на игрока
                    let dx = b.x - player.x;
                    let dy = b.y - player.y;
                    if (Math.hypot(dx, dy) < player.r + b.r) {
                        gameActive = false;
                        winner = 'enemy';
                        statusSpan.innerText = "ПОРАЖЕНИЕ!";
                        if (conn && conn.open) conn.send({ type: 'hit' });
                        showGameOver("Вы проиграли!");
                        bullets = [];
                        return;
                    }
                } else {
                    // свой снаряд → проверка на противника
                    let dx = b.x - opponent.x;
                    let dy = b.y - opponent.y;
                    if (Math.hypot(dx, dy) < opponent.r + b.r) {
                        gameActive = false;
                        winner = 'me';
                        statusSpan.innerText = "ПОБЕДА!";
                        if (conn && conn.open) conn.send({ type: 'hit' });
                        showGameOver("Вы победили!");
                        bullets = [];
                        return;
                    }
                }
            }
        }

        function showGameOver(msg) {
            if (gameOverTimer) return;
            gameOverTimer = setTimeout(() => {
                let overlay = document.createElement('div');
                overlay.style.position = 'absolute';
                overlay.style.top = 0;
                overlay.style.left = 0;
                overlay.style.width = '100%';
                overlay.style.height = '100%';
                overlay.style.background = 'rgba(0,0,0,0.85)';
                overlay.style.display = 'flex';
                overlay.style.justifyContent = 'center';
                overlay.style.alignItems = 'center';
                overlay.style.flexDirection = 'column';
                overlay.style.zIndex = 150;
                overlay.innerHTML = `<div style="color:#ffd966;font-size:32px;margin-bottom:20px;">${msg}</div>
                                     <button id="rematchBtn" style="padding:10px 20px;background:#ff8844;border:none;border-radius:30px;font-weight:bold;">🔁 ИГРАТЬ СНОВА</button>`;
                document.body.appendChild(overlay);
                document.getElementById('rematchBtn').onclick = () => {
                    overlay.remove();
                    resetGame();
                    if (conn && conn.open) conn.send({ type: 'reset' });
                };
            }, 50);
        }

        function resetGame() {
            gameActive = true;
            winner = null;
            bullets = [];
            if (gameOverTimer) clearTimeout(gameOverTimer);
            gameOverTimer = null;
            player.x = cw/2;
            player.y = ch * 0.8;
            opponent.x = cw/2;
            opponent.y = ch * 0.2;
            clampPositions();
            statusSpan.innerText = "⚔️ В БОЮ";
            if (conn && conn.open) sendPosition();
        }

        // --- Сетевые отправки ---
        function sendPosition() {
            if (conn && conn.open && gameStarted && gameActive) {
                conn.send({ type: 'pos', x: player.x, y: player.y });
            }
        }

        function sendShoot(angle) {
            if (conn && conn.open && gameStarted && gameActive) {
                conn.send({ type: 'shoot', angle: angle, x: player.x, y: player.y });
            }
        }

        // --- Обработчики ввода ---
        function onMove(e) {
            if (!gameStarted || !gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = cw / rect.width;
            const scaleY = ch / rect.height;
            let mx, my;
            if (e.touches) {
                mx = (e.touches[0].clientX - rect.left) * scaleX;
                my = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                mx = (e.clientX - rect.left) * scaleX;
                my = (e.clientY - rect.top) * scaleY;
            }
            if (my > ch/2) {
                let margin = player.r + 5;
                player.x = Math.min(cw - margin, Math.max(margin, mx));
                player.y = Math.min(ch - margin, Math.max(ch/2 + 20, my));
                sendPosition();
            }
        }

        function onFire(e) {
            if (!gameStarted || !gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = cw / rect.width;
            const scaleY = ch / rect.height;
            let cx, cy;
            if (e.touches) {
                cx = (e.touches[0].clientX - rect.left) * scaleX;
                cy = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                cx = (e.clientX - rect.left) * scaleX;
                cy = (e.clientY - rect.top) * scaleY;
            }
            if (cy < ch/2) {
                let dx = cx - player.x;
                let dy = cy - player.y;
                let angle = Math.atan2(dy, dx);
                shoot(angle, player.x, player.y, false);
                sendShoot(angle);
            }
        }

        // --- Сетевые соединения ---
        function setupConnection(connection) {
            conn = connection;
            conn.on('open', () => {
                console.log("Соединение открыто");
                gameStarted = true;
                startScreenDiv.style.display = 'none';
                resizeAndReset();    // подгоняем размеры и сбрасываем игру
                statusSpan.innerText = "⚔️ В БОЮ";
                sendPosition();
            });
            conn.on('data', (data) => {
                if (!gameStarted) return;
                if (data.type === 'pos') {
                    opponent.x = data.x;
                    opponent.y = data.y;
                    clampPositions();
                } else if (data.type === 'shoot') {
                    shoot(data.angle, data.x, data.y, true);
                } else if (data.type === 'hit') {
                    if (gameActive) {
                        gameActive = false;
                        winner = 'enemy';
                        statusSpan.innerText = "ПОРАЖЕНИЕ!";
                        bullets = [];
                        showGameOver("Противник победил");
                    }
                } else if (data.type === 'reset') {
                    resetGame();
                }
            });
            conn.on('close', () => {
                gameStarted = false;
                statusSpan.innerText = "Соединение потеряно";
                if (!gameOverTimer) showGameOver("Соединение разорвано");
            });
        }

        function createGame() {
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id;
                myIdBox.innerHTML = `🎮 Ваш ID: <strong>${id}</strong> <button id="copyIdBtn">📋 Копировать</button>`;
                myIdBox.style.display = 'block';
                document.getElementById('copyIdBtn').onclick = () => {
                    navigator.clipboard.writeText(id);
                    infoMsg.innerText = "ID скопирован!";
                    setTimeout(() => infoMsg.innerText = "", 1500);
                };
                infoMsg.innerText = "Ожидание подключения...";
                peer.on('connection', (conn) => {
                    infoMsg.innerText = "Противник подключился! Игра началась.";
                    setupConnection(conn);
                });
            });
            peer.on('error', (err) => {
                infoMsg.innerText = "Ошибка: " + err.type;
            });
        }

        function joinGame(peerId) {
            if (!peer) {
                peer = new Peer();
                peer.on('open', () => {
                    let conn = peer.connect(peerId);
                    setupConnection(conn);
                });
                peer.on('error', (err) => {
                    infoMsg.innerText = "Ошибка: " + err.type;
                });
            } else {
                let conn = peer.connect(peerId);
                setupConnection(conn);
            }
            startScreenDiv.style.display = 'none';
        }

        // --- Цикл рисования ---
        function draw() {
            drawBackground();
            drawUFO(opponent.x, opponent.y, opponent.r, 0, false);
            drawUFO(player.x, player.y, player.r, 120, true);
            drawBullets();
            drawUI();
        }

        function update() {
            if (gameStarted && gameActive) {
                updateBullets();
            }
        }

        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }

        // --- Инициализация событий ---
        window.addEventListener('resize', () => {
            resizeAndReset();
        });
        resetBtn.addEventListener('click', () => {
            if (gameStarted && conn && conn.open) {
                resetGame();
                conn.send({ type: 'reset' });
            } else if (gameStarted) {
                resetGame();
            }
        });
        createBtn.addEventListener('click', createGame);
        joinBtn.addEventListener('click', () => {
            let id = peerInput.value.trim();
            if (id) joinGame(id);
            else infoMsg.innerText = "Введите ID";
        });

        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mousedown', onFire);
        canvas.addEventListener('touchmove', onMove, { passive: false });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onFire(e); });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        resizeAndReset();
        animate();
    })();
</script>
</body>
</html>
