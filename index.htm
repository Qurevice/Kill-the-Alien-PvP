<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kill the Alien — PvP с комнатой</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { margin: 0; min-height: 100vh; background: #0a0f1a; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; }
        .game-wrapper { position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100%; height: 100%; background: #0b1219; cursor: crosshair; touch-action: none; }
        .ui-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); padding: 6px 12px; border-radius: 20px; color: #ffd966; z-index: 20; pointer-events: none; }
        .reset-btn { position: absolute; bottom: 16px; right: 16px; background: #ff8844; border: none; padding: 6px 15px; border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 100; }
        .start-screen, .lobby-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(8px); flex-direction: column; }
        .lobby-screen { z-index: 210; }
        .start-box, .lobby-box { background: #1a1e2a; border-radius: 30px; padding: 25px; text-align: center; border: 1px solid #ffd966; max-width: 90%; min-width: 280px; }
        .start-box button, .start-box input, .lobby-box button { margin: 8px; padding: 8px 15px; border-radius: 30px; border: none; font-size: 16px; font-family: monospace; font-weight: bold; }
        .start-box input { background: #2a2e3a; color: white; text-align: center; outline: none; }
        .start-box button, .lobby-box button { background: #ff8844; cursor: pointer; transition: 0.07s linear; }
        .start-box button:active, .lobby-box button:active { transform: scale(0.96); }
        .peer-id { background: #2a2e3a; padding: 10px; border-radius: 20px; color: #aaffaa; word-break: break-all; margin: 15px 0; }
        .message { color: #ffaa88; margin-top: 10px; font-size: 14px; }
        .copy-btn { background: #ffaa44; border: none; padding: 6px 12px; border-radius: 30px; margin-left: 12px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .player-list { background: #0f121c; border-radius: 20px; padding: 10px; margin: 15px 0; text-align: left; }
        .player-item { color: #aaffaa; margin: 5px 0; font-size: 14px; }
        .waiting-text { color: #ffaa88; margin-top: 10px; }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="ui-panel">
        <span id="gameStatusText">⚡ НЕ В ИГРЕ</span>
    </div>
    <button id="resetBtn" class="reset-btn" style="display: none;">♻️ РЕСТАРТ</button>

    <!-- Главный экран (выбор: создать или подключиться) -->
    <div id="startScreen" class="start-screen">
        <div class="start-box">
            <h2>👽 KILL THE ALIEN 👾</h2>
            <button id="createGameBtn">✨ СОЗДАТЬ КОМНАТУ</button>
            <div>
                <input id="peerInput" placeholder="Введите ID комнаты">
                <button id="joinGameBtn">🔌 ВОЙТИ В КОМНАТУ</button>
            </div>
            <div id="infoMessage" class="message"></div>
        </div>
    </div>

    <!-- Экран комнаты (лобби) -->
    <div id="lobbyScreen" class="lobby-screen" style="display: none;">
        <div class="lobby-box">
            <h2>🚀 КОМНАТА</h2>
            <div id="lobbyIdDisplay" class="peer-id"></div>
            <div class="player-list">
                <div>👤 Игроки в комнате:</div>
                <div id="playerListContainer"></div>
            </div>
            <div id="lobbyWaitingMessage" class="waiting-text">Ожидание подключения второго игрока...</div>
            <button id="startGameBtn" style="display: none; background: #44aa44;">▶ НАЧАТЬ ИГРУ</button>
            <button id="leaveLobbyBtn" style="background: #885544;">🚪 Выйти</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- DOM элементы ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameStatusSpan = document.getElementById('gameStatusText');
        const resetBtn = document.getElementById('resetBtn');
        const startScreenDiv = document.getElementById('startScreen');
        const lobbyScreenDiv = document.getElementById('lobbyScreen');
        const createBtn = document.getElementById('createGameBtn');
        const joinBtn = document.getElementById('joinGameBtn');
        const peerInput = document.getElementById('peerInput');
        const infoMsgSpan = document.getElementById('infoMessage');
        const lobbyIdDisplay = document.getElementById('lobbyIdDisplay');
        const playerListContainer = document.getElementById('playerListContainer');
        const lobbyWaitingMsg = document.getElementById('lobbyWaitingMessage');
        const startGameBtn = document.getElementById('startGameBtn');
        const leaveLobbyBtn = document.getElementById('leaveLobbyBtn');

        // --- Игровые параметры ---
        let cw, ch;
        let player = { x: 0, y: 0, r: 20 };
        let opponent = { x: 0, y: 0, r: 20 };
        let bullets = [];
        let gameActive = false;       // игра активна только когда запущена
        let winner = null;
        let gameOverTimer = null;
        let bulletSpeed = 8;
        let bulletRadius = 6;

        // --- P2P и сеть ---
        let peer = null;
        let dataConnection = null;
        let myPeerId = null;
        let isHost = false;           // создатель комнаты
        let gameStarted = false;      // флаг, что игра запущена (боевая фаза)

        // --- Функции игровой механики (адаптированы под gameStarted) ---
        function resizeCanvasAndReset() {
            cw = canvas.width = window.innerWidth;
            ch = canvas.height = window.innerHeight;
            let size = Math.min(cw, ch) * 0.045;
            player.r = size;
            opponent.r = size;
            bulletSpeed = size * 0.25;
            bulletRadius = size * 0.3;
            player.x = cw/2;
            player.y = ch * 0.8;
            opponent.x = cw/2;
            opponent.y = ch * 0.2;
            clampPositions();
            if (gameStarted) {
                bullets = [];
                gameActive = true;
                winner = null;
                if (gameOverTimer) clearTimeout(gameOverTimer);
                updateGameStatusText();
            }
        }

        function clampPositions() {
            let margin = player.r + 5;
            player.x = Math.min(cw - margin, Math.max(margin, player.x));
            player.y = Math.min(ch - margin, Math.max(ch/2 + 20, player.y));
            opponent.x = Math.min(cw - margin, Math.max(margin, opponent.x));
            opponent.y = Math.min(ch/2 - 20, Math.max(margin, opponent.y));
        }

        function updateGameStatusText() {
            if (!gameStarted) gameStatusSpan.innerText = "⚡ ОЖИДАНИЕ";
            else if (!gameActive) gameStatusSpan.innerText = (winner === 'me') ? "🏆 ПОБЕДА!" : "💀 ПОРАЖЕНИЕ";
            else gameStatusSpan.innerText = "⚔️ В БОЮ";
        }

        // --- Логика боя ---
        function shoot(angle, fromX, fromY, isEnemy = false) {
            if (!gameStarted || !gameActive) return;
            bullets.push({
                x: fromX, y: fromY,
                vx: Math.cos(angle) * bulletSpeed,
                vy: Math.sin(angle) * bulletSpeed,
                r: bulletRadius,
                isEnemy: isEnemy
            });
        }

        function updateBullets() {
            for (let i = 0; i < bullets.length; i++) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                if (b.x + b.r < 0 || b.x - b.r > cw || b.y + b.r < 0 || b.y - b.r > ch) {
                    bullets.splice(i,1);
                    i--;
                    continue;
                }
                if (!gameActive) continue;
                if (b.isEnemy) {
                    let dx = b.x - player.x;
                    let dy = b.y - player.y;
                    if (Math.hypot(dx, dy) < player.r + b.r) {
                        gameActive = false;
                        winner = 'enemy';
                        if (dataConnection && dataConnection.open) dataConnection.send({ type: 'hit' });
                        showGameOver("ВЫ ПРОИГРАЛИ!");
                        bullets = [];
                        updateGameStatusText();
                        return;
                    }
                } else {
                    let dx = b.x - opponent.x;
                    let dy = b.y - opponent.y;
                    if (Math.hypot(dx, dy) < opponent.r + b.r) {
                        gameActive = false;
                        winner = 'me';
                        if (dataConnection && dataConnection.open) dataConnection.send({ type: 'hit' });
                        showGameOver("ВЫ ПОБЕДИЛИ!");
                        bullets = [];
                        updateGameStatusText();
                        return;
                    }
                }
            }
        }

        function resetGameLocally() {
            if (!gameStarted) return;
            gameActive = true;
            winner = null;
            bullets = [];
            if (gameOverTimer) clearTimeout(gameOverTimer);
            gameOverTimer = null;
            player.x = cw/2;
            player.y = ch * 0.8;
            opponent.x = cw/2;
            opponent.y = ch * 0.2;
            clampPositions();
            updateGameStatusText();
            if (dataConnection && dataConnection.open) sendMyPosition();
        }

        function showGameOver(msg) {
            if (gameOverTimer) return;
            gameOverTimer = setTimeout(() => {
                let overlay = document.createElement('div');
                overlay.style.position = 'absolute';
                overlay.style.top = 0;
                overlay.style.left = 0;
                overlay.style.width = '100%';
                overlay.style.height = '100%';
                overlay.style.background = 'rgba(0,0,0,0.85)';
                overlay.style.display = 'flex';
                overlay.style.justifyContent = 'center';
                overlay.style.alignItems = 'center';
                overlay.style.flexDirection = 'column';
                overlay.style.zIndex = 150;
                overlay.innerHTML = `<div style="color:#ffd966;font-size:32px;margin-bottom:20px;">${msg}</div>
                                     <button id="rematchBtn" style="padding:10px 20px;background:#ff8844;border:none;border-radius:30px;font-weight:bold;">🔁 ИГРАТЬ СНОВА</button>`;
                document.body.appendChild(overlay);
                document.getElementById('rematchBtn').onclick = () => {
                    overlay.remove();
                    resetGameLocally();
                    if (dataConnection && dataConnection.open) dataConnection.send({ type: 'reset' });
                };
            }, 50);
        }

        // --- Сетевые отправки (только когда игра запущена) ---
        function sendMyPosition() {
            if (dataConnection && dataConnection.open && gameStarted && gameActive) {
                dataConnection.send({ type: 'pos', x: player.x, y: player.y });
            }
        }

        function sendMyShot(angle) {
            if (dataConnection && dataConnection.open && gameStarted && gameActive) {
                dataConnection.send({ type: 'shoot', angle: angle, x: player.x, y: player.y });
            }
        }

        // --- Управление движением и стрельбой (активно только в бою) ---
        function onMove(e) {
            if (!gameStarted || !gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = cw / rect.width;
            const scaleY = ch / rect.height;
            let mx, my;
            if (e.touches) {
                mx = (e.touches[0].clientX - rect.left) * scaleX;
                my = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                mx = (e.clientX - rect.left) * scaleX;
                my = (e.clientY - rect.top) * scaleY;
            }
            if (my > ch/2) {
                let margin = player.r + 5;
                let newX = Math.min(cw - margin, Math.max(margin, mx));
                let newY = Math.min(ch - margin, Math.max(ch/2 + 20, my));
                if (player.x !== newX || player.y !== newY) {
                    player.x = newX;
                    player.y = newY;
                    sendMyPosition();
                }
            }
        }

        function onFire(e) {
            if (!gameStarted || !gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = cw / rect.width;
            const scaleY = ch / rect.height;
            let cx, cy;
            if (e.touches) {
                cx = (e.touches[0].clientX - rect.left) * scaleX;
                cy = (e.touches[0].clientY - rect.top) * scaleY;
                e.preventDefault();
            } else {
                cx = (e.clientX - rect.left) * scaleX;
                cy = (e.clientY - rect.top) * scaleY;
            }
            if (cy < ch/2) {
                let dx = cx - player.x;
                let dy = cy - player.y;
                let angle = Math.atan2(dy, dx);
                shoot(angle, player.x, player.y, false);
                sendMyShot(angle);
            }
        }

        // --- Отрисовка (та же, что и раньше) ---
        function drawBackground() {
            let grad = ctx.createLinearGradient(0, 0, 0, ch);
            grad.addColorStop(0, "#0a1018");
            grad.addColorStop(1, "#03060c");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, cw, ch);
            ctx.beginPath();
            ctx.moveTo(0, ch/2);
            ctx.lineTo(cw, ch/2);
            ctx.strokeStyle = "#ffaa55";
            ctx.lineWidth = 3;
            ctx.setLineDash([10, 15]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawUFO(x, y, r, hue, isOwn) {
            ctx.save();
            ctx.translate(x, y);
            ctx.shadowBlur = 8;
            ctx.shadowColor = `hsl(${hue}, 80%, 60%)`;
            let grad = ctx.createRadialGradient(-4, -4, r*0.2, 0, 0, r);
            grad.addColorStop(0, `hsl(${hue}, 85%, 70%)`);
            grad.addColorStop(1, `hsl(${hue}, 75%, 40%)`);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, r-4, 0, Math.PI*2);
            ctx.fillStyle = `hsl(${hue}, 80%, 55%)`;
            ctx.fill();
            let cockpit = r * 0.45;
            ctx.beginPath();
            ctx.arc(0, 0, cockpit, 0, Math.PI*2);
            ctx.fillStyle = "#7ec8e3";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, cockpit-2, 0, Math.PI*2);
            ctx.fillStyle = "#9bdaf5";
            ctx.fill();
            ctx.restore();
        }

        function drawBullets() {
            for (let b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
                ctx.fillStyle = b.isEnemy ? "#ff6666" : "#88ff44";
                ctx.fill();
            }
        }

        function draw() {
            drawBackground();
            drawUFO(opponent.x, opponent.y, opponent.r, 0, false);
            drawUFO(player.x, player.y, player.r, 120, true);
            drawBullets();
        }

        function animate() {
            if (gameStarted && gameActive) updateBullets();
            draw();
            requestAnimationFrame(animate);
        }

        // --- Функции лобби и запуска игры ---
        function updateLobbyUI() {
            if (!lobbyScreenDiv.style.display === 'none') return;
            // Обновляем список игроков: создатель и подключённый
            if (isHost) {
                playerListContainer.innerHTML = '<div class="player-item">👑 Хост (вы)</div>';
                if (dataConnection && dataConnection.open) {
                    playerListContainer.innerHTML += '<div class="player-item">👤 Игрок 2 (подключён)</div>';
                    lobbyWaitingMsg.style.display = 'none';
                    startGameBtn.style.display = 'inline-block';
                } else {
                    playerListContainer.innerHTML += '<div class="player-item" style="color:#888;">⏳ Ожидание игрока...</div>';
                    lobbyWaitingMsg.style.display = 'block';
                    startGameBtn.style.display = 'none';
                }
            } else {
                // Клиент (не хост)
                playerListContainer.innerHTML = '<div class="player-item">👑 Хост (создатель)</div>';
                playerListContainer.innerHTML += '<div class="player-item">👤 Вы (подключены)</div>';
                lobbyWaitingMsg.innerText = 'Ожидаем, когда хост начнёт игру...';
                lobbyWaitingMsg.style.display = 'block';
                startGameBtn.style.display = 'none';
            }
        }

        function startTheGame() {
            if (!isHost) return; // только хост может начать
            if (!dataConnection || !dataConnection.open) return;
            // Отправляем команду старта всем
            dataConnection.send({ type: 'start' });
            // Запускаем игру локально
            launchGame();
        }

        function launchGame() {
            gameStarted = true;
            gameActive = true;
            winner = null;
            bullets = [];
            resizeCanvasAndReset();
            resetBtn.style.display = 'block';
            lobbyScreenDiv.style.display = 'none';
            startScreenDiv.style.display = 'none';
            updateGameStatusText();
            // Отправляем свою позицию после старта
            sendMyPosition();
        }

        function exitToLobby() {
            // Закрываем соединение, сбрасываем состояние
            if (dataConnection) dataConnection.close();
            if (peer) peer.destroy();
            peer = null;
            dataConnection = null;
            gameStarted = false;
            gameActive = false;
            resetBtn.style.display = 'none';
            lobbyScreenDiv.style.display = 'none';
            startScreenDiv.style.display = 'flex';
            infoMsgSpan.innerText = '';
        }

        // --- Обработка входящих соединений и данных ---
        function setupDataConnection(conn, isInitiator = false) {
            dataConnection = conn;
            dataConnection.on('open', () => {
                if (isHost) {
                    updateLobbyUI();
                } else {
                    // клиент: после открытия соединения ждём команды старта
                    updateLobbyUI();
                }
            });
            dataConnection.on('data', (data) => {
                if (data.type === 'start') {
                    // хост дал команду старта
                    launchGame();
                } else if (data.type === 'pos' && gameStarted) {
                    opponent.x = data.x;
                    opponent.y = data.y;
                    clampPositions();
                } else if (data.type === 'shoot' && gameStarted) {
                    shoot(data.angle, data.x, data.y, true);
                } else if (data.type === 'hit' && gameStarted) {
                    if (gameActive) {
                        gameActive = false;
                        winner = (isHost ? 'enemy' : 'me');
                        bullets = [];
                        showGameOver(isHost ? "ПОРАЖЕНИЕ!" : "ПОБЕДА!");
                        updateGameStatusText();
                    }
                } else if (data.type === 'reset' && gameStarted) {
                    resetGameLocally();
                }
            });
            dataConnection.on('close', () => {
                if (gameStarted) {
                    showGameOver("Соединение потеряно");
                    gameStarted = false;
                } else {
                    exitToLobby();
                }
            });
        }

        // --- Роль: СОЗДАТЕЛЬ (Host) ---
        function createLobby() {
            peer = new Peer(undefined, {
                host: 'game.peerjs.com',
                port: 443,
                secure: true,
                path: '/',
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
            });
            peer.on('open', (id) => {
                myPeerId = id;
                isHost = true;
                lobbyIdDisplay.innerHTML = `🏷️ ID комнаты: <strong>${id}</strong> <button class="copy-btn" id="copyLobbyIdBtn">📋 Копировать</button>`;
                const copyBtn = document.getElementById('copyLobbyIdBtn');
                if (copyBtn) {
                    copyBtn.onclick = () => {
                        navigator.clipboard.writeText(id);
                        infoMsgSpan.innerText = "ID скопирован! Отправьте другу.";
                        setTimeout(() => infoMsgSpan.innerText = "", 2000);
                    };
                }
                startScreenDiv.style.display = 'none';
                lobbyScreenDiv.style.display = 'flex';
                updateLobbyUI();
                // Ожидаем подключения клиента
                peer.on('connection', (conn) => {
                    setupDataConnection(conn, true);
                    updateLobbyUI();
                });
            });
            peer.on('error', (err) => {
                infoMsgSpan.innerText = `Ошибка: ${err.type}`;
                console.error(err);
            });
        }

        // --- Роль: КЛИЕНТ (подключается к хосту) ---
        function joinLobby(hostId) {
            if (!hostId) {
                infoMsgSpan.innerText = "Введите ID комнаты!";
                return;
            }
            peer = new Peer(undefined, {
                host: 'game.peerjs.com',
                port: 443,
                secure: true,
                path: '/',
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
            });
            peer.on('open', () => {
                const conn = peer.connect(hostId);
                setupDataConnection(conn, false);
                startScreenDiv.style.display = 'none';
                lobbyScreenDiv.style.display = 'flex';
                updateLobbyUI();
            });
            peer.on('error', (err) => {
                infoMsgSpan.innerText = `Ошибка: ${err.type}`;
                console.error(err);
            });
        }

        // --- Обработчики кнопок UI ---
        createBtn.addEventListener('click', createLobby);
        joinBtn.addEventListener('click', () => {
            const id = peerInput.value.trim();
            if (id) joinLobby(id);
            else infoMsgSpan.innerText = "Введите ID!";
        });
        startGameBtn.addEventListener('click', startTheGame);
        leaveLobbyBtn.addEventListener('click', () => {
            exitToLobby();
        });
        resetBtn.addEventListener('click', () => {
            if (gameStarted && dataConnection && dataConnection.open) {
                resetGameLocally();
                dataConnection.send({ type: 'reset' });
            } else if (gameStarted) {
                resetGameLocally();
            }
        });

        // --- События мыши / касаний (активны всегда, но стрельба/движение проверяют gameStarted внутри)---
        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mousedown', onFire);
        canvas.addEventListener('touchmove', onMove, { passive: false });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onFire(e); });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        window.addEventListener('resize', () => {
            resizeCanvasAndReset();
        });

        resizeCanvasAndReset();
        animate();
    })();
</script>
</body>
</html>
